# ─────────────────────────────────────────────────────────────────────────────
# Dialed API Gateway — nginx reverse proxy
# ─────────────────────────────────────────────────────────────────────────────
# Routes /api/v1/* to the appropriate backend service.
# SSE endpoints get special buffering config.
# CORS headers are set for the frontend origin.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'req_id=$http_x_request_id rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Upstreams ────────────────────────────────────────────────────────────

    upstream core_api {
        server core-api:8001;
    }

    upstream telemetry_ingestion {
        server telemetry-ingestion:8002;
    }

    upstream ai_service {
        server ai:8003;
    }

    # ── CORS map ─────────────────────────────────────────────────────────────
    # Allow the frontend dev server and any localhost origin

    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
    }

    # ── Main server ──────────────────────────────────────────────────────────

    server {
        listen 8000;
        server_name _;

        # ── CORS headers (applied to all responses) ──────────────────────────

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-Internal-Token" always;
        add_header Access-Control-Expose-Headers "X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;

        # Preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-Internal-Token" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # ── Common proxy settings ────────────────────────────────────────────

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # ── Health check ─────────────────────────────────────────────────────

        location = /health {
            proxy_pass http://core_api/health;
        }

        # ── Docs (unified OpenAPI UI) ────────────────────────────────────────

        location = /docs {
            proxy_pass http://core_api/docs;
        }

        location = /openapi.json {
            proxy_pass http://core_api/openapi.json;
        }

        # ── Core API routes ──────────────────────────────────────────────────

        location /api/v1/auth/ {
            proxy_pass http://core_api/auth/;
        }

        location /api/v1/garage/ {
            proxy_pass http://core_api/garage/;
        }

        location /api/v1/sessions/ {
            proxy_pass http://core_api/sessions/;
        }

        location /api/v1/sessions {
            proxy_pass http://core_api/sessions;
        }

        location /api/v1/progress/ {
            proxy_pass http://core_api/progress/;
        }

        location /api/v1/progress {
            proxy_pass http://core_api/progress;
        }

        location /api/v1/admin/ {
            proxy_pass http://core_api/admin/;
        }

        # ── Telemetry / Ingestion routes ─────────────────────────────────────

        location /api/v1/ingest/ {
            proxy_pass http://telemetry_ingestion/ingest/;

            # File uploads can be large
            client_max_body_size 100m;
        }

        location /api/v1/telemetry/ {
            proxy_pass http://telemetry_ingestion/telemetry/;
        }

        # SSE: ingestion job stream — disable buffering for real-time events
        location ~ ^/api/v1/ingest/jobs/[^/]+/stream$ {
            proxy_pass http://telemetry_ingestion;
            rewrite ^/api/v1(.*)$ $1 break;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
        }

        # ── AI routes ────────────────────────────────────────────────────────

        location /api/v1/suggest/ {
            proxy_pass http://ai_service/suggest/;
        }

        location /api/v1/suggest {
            proxy_pass http://ai_service/suggest;
        }

        # SSE: suggestion stream — disable buffering for real-time events
        location ~ ^/api/v1/suggest/[^/]+/stream$ {
            proxy_pass http://ai_service;
            rewrite ^/api/v1(.*)$ $1 break;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
        }

        # ── Fallback ─────────────────────────────────────────────────────────

        location / {
            return 404 '{"error":"Not found","code":"NOT_FOUND","request_id":""}';
            default_type application/json;
        }
    }
}
