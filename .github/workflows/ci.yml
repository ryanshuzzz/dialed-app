# Dialed — continuous integration (frontend + Python services)
# Plan & extensions: plans/ci-github.md

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: OpenAPI validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate OpenAPI specs
        run: |
          npx --yes @apidevtools/swagger-cli@4.0.4 validate contracts/openapi/core-api.yaml
          npx --yes @apidevtools/swagger-cli@4.0.4 validate contracts/openapi/ai.yaml
          npx --yes @apidevtools/swagger-cli@4.0.4 validate contracts/openapi/telemetry-ingestion.yaml

  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          CI: "true"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  core-api:
    name: Core API (pytest + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: dialed_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dialed_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:devpassword@localhost:5432/dialed_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared
          pip install -r services/core-api/requirements-test.txt

      - name: Pytest
        working-directory: services/core-api
        run: pytest -q --tb=short

  telemetry-ingestion:
    name: Telemetry (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared
          pip install -r services/telemetry-ingestion/requirements-test.txt

      - name: Pytest
        working-directory: services/telemetry-ingestion
        run: pytest -q --tb=short

  ai:
    name: AI service (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./shared
          pip install -r services/ai/requirements-test.txt

      - name: Pytest
        working-directory: services/ai
        run: pytest -q --tb=short
